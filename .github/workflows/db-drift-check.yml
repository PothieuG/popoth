name: DB drift check

# Runs the schema and RPC drift detectors against prod once a week (Monday 08:00 UTC)
# and on demand. Opens a GitHub issue if either check returns exit 1.
#
# Required secret: SUPABASE_ACCESS_TOKEN
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   Generate at https://supabase.com/dashboard/account/tokens
#
# Sprint Hardening / H5.

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check schema drift (prod vs baseline)
        run: pnpm db:check-drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check RPC presence (4 finance RPCs)
        if: always()
        run: pnpm db:check-rpcs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `DB drift detected (${new Date().toISOString().slice(0, 10)})`,
              body: [
                `\`pnpm db:check-drift\` or \`pnpm db:check-rpcs\` returned a non-zero exit code.`,
                ``,
                `Run: ${runUrl}`,
                ``,
                `Recovery:`,
                `1. Inspect the diff in the failed step's log.`,
                `2. If prod is the source of truth, regenerate the baseline:`,
                `   \`node scripts/export-schema.mjs supabase/migrations/20260101000000_remote_schema.sql\``,
                `3. If the repo is the source of truth, push the missing migration:`,
                `   \`pnpm supabase db push\` (or \`node scripts/apply-sql.mjs\` for ad-hoc).`,
                `4. Re-run this workflow via the "Run workflow" button.`,
              ].join('\n'),
              labels: ['db-drift', 'automation'],
            })
