name: DB drift check

# Runs the schema, RPC, and trigger-function drift detectors against prod once
# a week (Monday 08:00 UTC) and on demand. Opens a GitHub issue if any check
# returns exit 1.
#
# Required secret: SUPABASE_ACCESS_TOKEN
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   Generate at https://supabase.com/dashboard/account/tokens
#
# Sprint Hardening / H5 (drift + RPC). Sprint Audit-Triggers / A4 (functions).

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    # contents:read is needed by actions/checkout. issues:write is needed
    # by the "Open issue on failure" step (default GITHUB_TOKEN only has
    # contents:read, which produces a 403 from the issues create endpoint).
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      # Version is read from package.json#packageManager — explicit `with: version`
      # would conflict (action-setup@v4 errors out when both are set, even on match).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check schema drift (prod vs baseline)
        run: pnpm db:check-drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check RPC presence (4 finance RPCs)
        if: always()
        run: pnpm db:check-rpcs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check trigger functions presence (4 captured functions)
        if: always()
        run: pnpm db:check-functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check generated types are fresh (lib/database.types.ts vs prod)
        if: always()
        run: pnpm db:check-types-fresh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `DB drift detected (${new Date().toISOString().slice(0, 10)})`,
              body: [
                `\`pnpm db:check-drift\`, \`pnpm db:check-rpcs\`, \`pnpm db:check-functions\`, or \`pnpm db:check-types-fresh\` returned a non-zero exit code.`,
                ``,
                `Run: ${runUrl}`,
                ``,
                `Recovery:`,
                `1. Inspect the diff in the failed step's log.`,
                `2. If prod is the source of truth, regenerate the baseline:`,
                `   \`node scripts/export-schema.mjs supabase/migrations/20260101000000_remote_schema.sql\``,
                `3. If the repo is the source of truth, push the missing migration:`,
                `   \`pnpm supabase db push\` (or \`node scripts/apply-sql.mjs\` for ad-hoc).`,
                `4. Re-run this workflow via the "Run workflow" button.`,
              ].join('\n'),
              labels: ['db-drift', 'automation'],
            })
